# NOTE: The analyst-ssh-keys Secret is created by install_02_platform.py
#       from a freshly generated ED25519 key pair. Do not add a real
#       public key here — it will be overwritten by the installer.
---
apiVersion: v1
kind: Secret
metadata:
  name: analyst-ssh-keys
  namespace: analyst
type: Opaque
stringData:
  authorized_keys: |
    # Populated by install_02_platform.py — do not edit manually
    # ssh-ed25519 AAAA... analyst@secops-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jump-host
  namespace: analyst
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jump-host
  template:
    metadata:
      labels:
        app: jump-host
    spec:
      containers:
        - name: jump-host
          image: ctf-jump-host:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 22
          volumeMounts:
            - name: ssh-keys
              mountPath: /etc/ssh/authorized_keys/analyst
              subPath: authorized_keys
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
                - SYS_CHROOT
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - AUDIT_WRITE
              drop:
                - ALL
      volumes:
        - name: ssh-keys
          secret:
            secretName: analyst-ssh-keys
---
apiVersion: v1
kind: Service
metadata:
  name: jump-host
  namespace: analyst
spec:
  type: NodePort
  selector:
    app: jump-host
  ports:
    - port: 22
      targetPort: 22
      nodePort: 32022
